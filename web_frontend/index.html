<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 RAG Chat - 知识库问答</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #6366f1;
    --accent2: #818cf8;
    --success: #22c55e;
    --warn: #f59e0b;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(99,102,241,0.2);
    color: var(--accent2);
    border: 1px solid rgba(99,102,241,0.3);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.offline { background: #ef4444; }

  /* Chat Area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--accent); }
  .msg.assistant .avatar { background: linear-gradient(135deg, #22c55e, #16a34a); }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: 14px;
    word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--surface); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

  /* Markdown inside bubble */
  .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; font-size: 1.05em; }
  .bubble h2 { font-size: 1em; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
  .bubble li { margin: 2px 0; }
  .bubble code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  .bubble pre {
    background: #0f172a;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble blockquote {
    border-left: 3px solid var(--accent2);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text2);
  }
  .bubble .doc-ref {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    color: var(--accent2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    margin: 0 2px;
  }
  .bubble strong { color: #fbbf24; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .bubble th, .bubble td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .bubble th { background: var(--surface2); }

  /* Thinking Indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    color: var(--text2);
    font-size: 13px;
    align-self: flex-start;
  }
  .thinking .dots { display: flex; gap: 3px; }
  .thinking .dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .thinking .dots span:nth-child(1) { animation-delay: -0.32s; }
  .thinking .dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Input */
  .input-area {
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 28px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text2); }
  .input-row button {
    padding: 12px 24px;
    border-radius: 28px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .input-row button:hover:not(:disabled) { background: var(--accent2); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .input-row button .loading { display: none; }
  .input-row button.sending .send-text { display: none; }
  .input-row button.sending .loading { display: inline-block; }

  /* Toggle */
  .toggle-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text2);
  }
  .toggle {
    display: flex;
    background: var(--bg);
    border-radius: 20px;
    padding: 2px;
    border: 1px solid var(--border);
  }
  .toggle label {
    padding: 4px 14px;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
  }
  .toggle input { display: none; }
  .toggle input:checked + label { background: var(--accent); color: #fff; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .welcome h2 { font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 14px; max-width: 480px; margin: 0 auto 20px; line-height: 1.6; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .tag:hover { border-color: var(--accent2); color: var(--text); }

  /* Error */
  .error-banner {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    align-self: center;
    max-width: 600px;
  }

  .empty-state { flex:1; display:flex; align-items:center; justify-content:center; }

  /* Responsive */
  @media (max-width: 640px) {
    .msg { max-width: 95%; }
    .input-row { gap: 6px; }
    .input-row button { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 知识库 RAG 问答</h1>
  <div>
    <span class="status-dot online" id="statusDot"></span>
    <span class="badge" id="statusText">后端已连接</span>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="empty-state">
    <div class="welcome">
      <h2>👋 欢迎体验 Agentic RAG</h2>
      <p>基于硅基流动免费 API 的知识库问答系统，支持问题拆解、多阶段检索、上下文反思。</p>
      <div class="tags">
        <span class="tag" onclick="sendPreset('什么是 Agentic RAG？')">什么是 Agentic RAG？</span>
        <span class="tag" onclick="sendPreset('RAG 系统有哪些核心组件？')">RAG 核心组件</span>
        <span class="tag" onclick="sendPreset('如何提高检索准确率？')">提高检索准确率</span>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="toggle-row">
    <span>模式:</span>
    <div class="toggle">
      <input type="radio" name="mode" id="modeAgentic" value="agentic" checked>
      <label for="modeAgentic">🔍 完整 Agent</label>
      <input type="radio" name="mode" id="modeSimple" value="simple">
      <label for="modeSimple">⚡ 快速检索</label>
    </div>
  </div>
  <div class="input-row">
    <input id="queryInput" type="text" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">
      <span class="send-text">发送</span>
      <span class="loading">⏳</span>
    </button>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';
let isStreaming = false;

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) {
      document.getElementById('statusDot').className = 'status-dot online';
      document.getElementById('statusText').textContent = '后端已连接';
    }
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '后端离线';
  }
}

checkHealth();
setInterval(checkHealth, 30000);

function getMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

function sendPreset(q) {
  document.getElementById('queryInput').value = q;
  send();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function simpleMarkdown(text) {
  // Basic markdown -> HTML
  let html = escapeHtml(text);

  // Escape prevention: first convert code blocks to markers
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code class="language-${escapeHtml(lang)}">${escapeHtml(code.trim())}</code></pre>`);
    return `%%CODE${idx}%%`;
  });
  html = html.replace(/`([^`]+)`/g, (_, code) => `<code>${escapeHtml(code)}</code>`);

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Bullet lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Numbered lists
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

  // Blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Doc references [Doc_ID: xxx]
  html = html.replace(/\[Doc_ID:\s*([^\]]+)\]/gi, '<span class="doc-ref">📄 Doc: $1</span>');

  // Line breaks
  html = html.replace(/\n\n/g, '<br><br>');

  // Restore code blocks
  codeBlocks.forEach((code, i) => {
    html = html.replace(`%%CODE${i}%%`, code);
  });

  return html;
}

function addMessage(role, content) {
  const container = document.getElementById('chatContainer');
  // Remove empty state if present
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = simpleMarkdown(content);

  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  container.appendChild(msgDiv);
  container.scrollTop = container.scrollHeight;

  return msgDiv;
}

function addThinking() {
  const container = document.getElementById('chatContainer');
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinkingIndicator';
  div.innerHTML = '🤖 正在检索和思考 <span class="dots"><span></span><span></span><span></span></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinkingIndicator');
  if (el) el.remove();
}

function addError(msg) {
  const container = document.getElementById('chatContainer');
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();
  removeThinking();

  const div = document.createElement('div');
  div.className = 'error-banner';
  div.textContent = '⚠️ ' + msg;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function send() {
  if (isStreaming) return;

  const input = document.getElementById('queryInput');
  const query = input.value.trim();
  if (!query) return;

  const btn = document.getElementById('sendBtn');
  const mode = getMode();

  // Add user message
  addMessage('user', query);
  input.value = '';
  input.focus();

  // Start streaming state
  isStreaming = true;
  btn.classList.add('sending');
  btn.disabled = true;
  addThinking();

  try {
    const response = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, stream: true, mode }),
    });

    if (!response.ok) {
      const errText = await response.text();
      addError(`请求失败 (${response.status}): ${errText}`);
      return;
    }

    removeThinking();

    // Create assistant message bubble for streaming
    const assistantDiv = addMessage('assistant', '');
    const bubble = assistantDiv.querySelector('.bubble');
    bubble.innerHTML = '';

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // Parse SSE events
      const lines = buffer.split('\n');
      buffer = lines.pop() || ''; // keep incomplete line in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;

        try {
          const data = JSON.parse(jsonStr);
          if (data.type === 'text' && data.content) {
            bubble.innerHTML += data.content;
            // Apply markdown
            bubble.innerHTML = simpleMarkdown(bubble.textContent || bubble.innerText || '');
          } else if (data.type === 'done') {
            // Stream complete
          } else if (data.type === 'error') {
            addError(data.content);
            return;
          }
        } catch (e) {
          // Skip malformed JSON
        }
      }

      // Scroll
      const container = document.getElementById('chatContainer');
      container.scrollTop = container.scrollHeight;
    }

  } catch (e) {
    addError(`网络错误: ${e.message}`);
  } finally {
    isStreaming = false;
    btn.classList.remove('sending');
    btn.disabled = false;
    removeThinking();
    input.focus();
  }
}

// Focus input on load
document.getElementById('queryInput').focus();
</script>

</body>
</html>
