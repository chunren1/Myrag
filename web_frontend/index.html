<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 RAG Chat - 知识库问答</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #6366f1;
    --accent2: #818cf8;
    --success: #22c55e;
    --warn: #f59e0b;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(99,102,241,0.2);
    color: var(--accent2);
    border: 1px solid rgba(99,102,241,0.3);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.offline { background: #ef4444; }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--accent); }
  .msg.assistant .avatar { background: linear-gradient(135deg, #22c55e, #16a34a); }
  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: 14px;
    word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--surface); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; font-size: 1.05em; }
  .bubble h2 { font-size: 1em; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }
  .bubble li { margin: 2px 0; }
  .bubble code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  .bubble pre { background: #0f172a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble blockquote { border-left: 3px solid var(--accent2); padding-left: 12px; margin: 8px 0; color: var(--text2); }
  .bubble .doc-ref {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    color: var(--accent2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.85em;
    margin: 0 2px;
  }
  .bubble strong { color: #fbbf24; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .bubble th, .bubble td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  .bubble th { background: var(--surface2); }
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    color: var(--text2);
    font-size: 13px;
    align-self: flex-start;
  }
  .thinking .dots { display: flex; gap: 3px; }
  .thinking .dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .thinking .dots span:nth-child(1) { animation-delay: -0.32s; }
  .thinking .dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .input-area {
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 28px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text2); }
  .input-row button {
    padding: 12px 24px;
    border-radius: 28px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .input-row button:hover:not(:disabled) { background: var(--accent2); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  .toggle-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text2);
  }
  .toggle {
    display: flex;
    background: var(--bg);
    border-radius: 20px;
    padding: 2px;
    border: 1px solid var(--border);
  }
  .toggle label {
    padding: 4px 14px;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
  }
  .toggle input { display: none; }
  .toggle input:checked + label { background: var(--accent); color: #fff; }
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }
  .welcome h2 { font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 14px; max-width: 480px; margin: 0 auto 20px; line-height: 1.6; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .tag:hover { border-color: var(--accent2); color: var(--text); }
  .error-banner {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    align-self: center;
    max-width: 600px;
  }
  .empty-state { flex:1; display:flex; align-items:center; justify-content:center; }
  @media (max-width: 640px) {
    .msg { max-width: 95%; }
    .input-row { gap: 6px; }
    .input-row button { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 知识库 RAG 问答</h1>
  <div>
    <span class="status-dot" :class="online ? 'online' : 'offline'"></span>
    <span class="badge" x-text="online ? '后端已连接' : '后端离线'"></span>
  </div>
</div>

<div class="chat-container" id="chatContainer" x-ref="chatBox">
  <template x-if="messages.length === 0">
    <div class="empty-state">
      <div class="welcome">
        <h2>👋 欢迎体验 Agentic RAG</h2>
        <p>基于硅基流动免费 API 的知识库问答系统，支持问题拆解、多阶段检索、上下文反思。</p>
        <div class="tags">
          <template x-for="preset in presets" :key="preset">
            <span class="tag" x-text="preset" @click="$refs.queryInput.value = preset; send()"></span>
          </template>
        </div>
      </div>
    </div>
  </template>

  <template x-for="(msg, idx) in messages" :key="idx">
    <div class="msg" :class="msg.role">
      <div class="avatar" x-text="msg.role === 'user' ? '👤' : '🤖'"></div>
      <div class="bubble" x-html="msg.role === 'assistant' ? renderMd(msg.content) : msg.content"></div>
    </div>
  </template>

  <template x-if="streaming">
    <div class="thinking">
      🤖 正在检索和思考 <span class="dots"><span></span><span></span><span></span></span>
    </div>
  </template>

  <template x-if="error">
    <div class="error-banner" x-text="'⚠️ ' + error"></div>
  </template>
</div>

<div class="input-area">
  <div class="toggle-row">
    <span>模式:</span>
    <div class="toggle">
      <input type="radio" name="mode" id="mAgentic" value="agentic" x-model="mode">
      <label for="mAgentic">🔍 完整 Agent</label>
      <input type="radio" name="mode" id="mSimple" value="simple" x-model="mode">
      <label for="mSimple">⚡ 快速检索</label>
    </div>
  </div>
  <div class="input-row">
    <input x-ref="queryInput" type="text" placeholder="输入你的问题..."
      @keydown.enter="send()" :disabled="streaming">
    <button @click="send()" :disabled="streaming">
      <span x-show="!streaming">发送</span>
      <span x-show="streaming">⏳</span>
    </button>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';

function renderMd(text) {
  if (!text) return '';
  let h = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const blocks = [];
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.length;
    blocks.push(`<pre><code>${code.trim()}</code></pre>`);
    return `%%B${i}%%`;
  });
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  h = h.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/\[Doc_ID:\s*([^\]]+)\]/g, '<span class="doc-ref">📄 Doc: $1</span>');
  h = h.replace(/\n\n/g, '<br><br>');
  blocks.forEach((b, i) => { h = h.replace(`%%B${i}%%`, b); });
  return h;
}

function app() {
  return {
    online: true,
    mode: 'agentic',
    streaming: false,
    messages: [],
    error: null,
    presets: ['什么是 Agentic RAG？', 'RAG 系统有哪些核心组件？', '如何提高检索准确率？'],

    async init() {
      this.checkHealth();
      setInterval(() => this.checkHealth(), 30000);
    },

    async checkHealth() {
      try {
        const r = await fetch(`${API}/health`);
        this.online = r.ok;
      } catch { this.online = false; }
    },

    renderMd,

    async send() {
      const input = this.$refs.queryInput;
      const query = input.value.trim();
      if (!query || this.streaming) return;

      this.messages.push({ role: 'user', content: query });
      this.error = null;
      input.value = '';
      this.scrollToBottom();

      this.streaming = true;
      const assistantMsg = { role: 'assistant', content: '' };
      this.messages.push(assistantMsg);
      this.scrollToBottom();

      try {
        const res = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, stream: true, mode: this.mode }),
        });

        if (!res.ok) {
          const errText = await res.text();
          this.error = `请求失败 (${res.status}): ${errText}`;
          this.messages.pop();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr) continue;
            try {
              const data = JSON.parse(jsonStr);
              if (data.type === 'text' && data.content) {
                fullText += data.content;
                assistantMsg.content = fullText;
                this.scrollToBottom();
              } else if (data.type === 'error') {
                this.error = data.content;
                return;
              }
            } catch {}
          }
        }
      } catch (e) {
        this.error = `网络错误: ${e.message}`;
        this.messages.pop();
      } finally {
        this.streaming = false;
        this.$refs.queryInput.focus();
      }
    },

    scrollToBottom() {
      this.$nextTick(() => {
        const box = this.$refs.chatBox;
        box.scrollTop = box.scrollHeight;
      });
    }
  };
}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</body>
</html>
