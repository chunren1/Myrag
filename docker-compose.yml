# ============================================================
# Docker Compose - 基础设施编排
# 仅包含 Qdrant 向量数据库，用于本地开发
# 启动: docker compose up -d
# 停止: docker compose down
# ============================================================

version: "3.8"

services:
  qdrant:
    # Qdrant 向量数据库 - 高性能相似度搜索
    image: qdrant/qdrant:v1.9.0
    container_name: qdrant
    restart: unless-stopped

    # 端口映射: 宿主机 6333 -> 容器 6333 (REST API)
    # 端口 6334 为 gRPC 接口，仅在需要时映射
    ports:
      - "6333:6333"
      - "6334:6334"

    # 挂载本地目录持久化向量数据
    volumes:
      - ./qdrant_storage:/qdrant/storage:z

    # 内存限制: 最多使用 2GB
    mem_limit: 2g

    # 环境变量
    environment:
      # API Key (可选，用于授权访问，开发环境可留空)
      # QDRANT__SERVICE__API_KEY: your-secret-key

      # 日志级别
      QDRANT__LOG_LEVEL: INFO

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
